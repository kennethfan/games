<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="description" content="贪吃蛇小游戏：控制小蛇吃豆变长，小心别撞墙或咬到自己，支持键盘与触摸。" />
    <meta name="theme-color" content="#0f1117" />
    <link rel="stylesheet" href="assets/common.css" />
    <script src="assets/common.js"></script>
    <title>贪吃蛇</title>
    <style>




        .game-board {
            position: relative;
        }

        #gameCanvas {
            border: 2px solid #2a3042;
            border-radius: 10px;
            background: #0a0a15;
            display: block;
            max-width: 100%;
            height: auto;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 17, 23, 0.88);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            z-index: 10;
        }

        .overlay-text {
            font-size: 36px;
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .overlay-sub {
            font-size: 20px;
            color: #ffd93d;
            margin-bottom: 25px;
        }

        /* 移动端虚拟方向键（仅在触摸设备上显示） */
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 56px);
            grid-template-rows: repeat(3, 56px);
            gap: 8px;
            margin: 16px auto 0;
            touch-action: none;
        }
        .dbtn {
            width: 56px; height: 56px;
            border-radius: 12px;
            padding: 0;
            font-size: 22px;
            display: grid; place-items: center;
            background: #161922;
            color: #6c8cff;
        }
        .dbtn:active { background: #16385f; transform: scale(0.94); }
        .dpad .up    { grid-area: 1 / 2; }
        .dpad .left  { grid-area: 2 / 1; }
        .dpad .right { grid-area: 2 / 3; }
        .dpad .down  { grid-area: 3 / 2; }

        /* 桌面端（精确指针）隐藏虚拟键，避免冗余 */
        @media (hover: hover) and (pointer: fine) {
            .dpad { display: none; }
        }

        @media (max-width: 640px) {
            .game-wrap { max-width: 94vw; }
            #gameCanvas { width: 100%; height: auto; touch-action: none; }
        }
    </style>
</head>
<body>
    <div class="game-wrap">
        <header class="game-header">
            <a class="back-link" href="index.html">← 返回</a>
            <h1 class="game-title">贪吃蛇</h1>
            <button id="soundBtn" class="icon-btn" onclick="toggleSound()">🔊</button>
        </header>

        <section class="game-stats">
            <div class="stat"><div class="stat-label">得分</div><div class="stat-value stat-score" id="score">0</div></div>
            <div class="stat"><div class="stat-label">最高</div><div class="stat-value stat-best" id="best">0</div></div>
        </section>

        <section class="game-stage">
            <div class="game-board">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                <div id="overlay" class="overlay" style="display: none;">
                    <div class="overlay-text" id="overlayTitle">游戏结束!</div>
                    <div class="overlay-sub" id="overlaySub">得分: 0</div>
                    <button onclick="restartGame()">重新开始</button>
                </div>

                <div class="dpad" id="dpad">
                    <button class="dbtn up" data-dir="up">▲</button>
                    <button class="dbtn left" data-dir="left">◀</button>
                    <button class="dbtn right" data-dir="right">▶</button>
                    <button class="dbtn down" data-dir="down">▼</button>
                </div>
            </div>
        </section>

        <footer class="game-toolbar">
            <div class="hint"><b>↑↓←→</b> / <b>WASD</b> 移动 · <b>空格</b>暂停 · <b>R</b> 重开（手机：方向键或滑动）</div>
            <button onclick="restartGame()">重新开始</button>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const GRID_SIZE = 20;           // 网格数量 20x20
        const CELL_SIZE = 20;           // 每格像素大小

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let best = 0;
        let speed = 180;                // 移动间隔(ms)，值越大越慢
        let gameOver = false;
        let paused = false;
        let gameLoopId = null;
        let lastMoveTime = 0;

        function initGame() {
            snake = [
                { x: 8, y: 10 },
                { x: 7, y: 10 },
                { x: 6, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = 180;
            gameOver = false;
            paused = false;
            lastMoveTime = 0;
            document.getElementById('score').textContent = '0';
            spawnFood();
            hideOverlay();
        }

        function spawnFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
            } while (snake.some(seg => seg.x === newFood.x && seg.y === newFood.y));
            food = newFood;
        }

        function drawCell(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * CELL_SIZE + 1, y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
        }

        function drawGrid() {
            ctx.strokeStyle = '#1c2433';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();

            // 绘制食物（带闪烁效果）
            const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);
            ctx.fillStyle = `rgba(181, 108, 255, ${pulse})`;
            ctx.fillRect(food.x * CELL_SIZE + 2, food.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);

            // 绘制蛇身
            snake.forEach((seg, idx) => {
                if (idx === 0) {
                    drawCell(seg.x, seg.y, '#8a9bff');   // 蛇头
                } else {
                    const ratio = 1 - idx / (snake.length + 5);
                    ctx.fillStyle = `rgba(124, 123, 255, ${0.5 + ratio * 0.5})`;
                    ctx.fillRect(seg.x * CELL_SIZE + 2, seg.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                }
            });

            // 绘制蛇头眼睛
            const head = snake[0];
            ctx.fillStyle = '#0a0a15';
            const ex = head.x * CELL_SIZE, ey = head.y * CELL_SIZE;
            if (direction.x === 1) {
                ctx.fillRect(ex + 13, ey + 4, 3, 3);
                ctx.fillRect(ex + 13, ey + 13, 3, 3);
            } else if (direction.x === -1) {
                ctx.fillRect(ex + 4, ey + 4, 3, 3);
                ctx.fillRect(ex + 4, ey + 13, 3, 3);
            } else if (direction.y === 1) {
                ctx.fillRect(ex + 4, ey + 13, 3, 3);
                ctx.fillRect(ex + 13, ey + 13, 3, 3);
            } else {
                ctx.fillRect(ex + 4, ey + 4, 3, 3);
                ctx.fillRect(ex + 13, ey + 4, 3, 3);
            }
        }

        function update() {
            direction = nextDirection;
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 撞墙检测
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                endGame();
                return;
            }

            // 撞自身检测
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                beep(600, 0.05, 'square', 0.04);
                document.getElementById('score').textContent = score;
                // 加速：每吃一个略提速，下限80ms避免过快
                if (speed > 80) speed -= 2;
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function gameLoop(timestamp) {
            if (gameOver) return;

            if (!paused) {
                if (timestamp - lastMoveTime >= speed) {
                    update();
                    lastMoveTime = timestamp;
                }
                draw();
            }
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameOver = true;
            // 更新最高分
            best = Math.max(best, score);
            localStorage.setItem('snakeBest', best);
            document.getElementById('best').textContent = best;

            document.getElementById('overlayTitle').textContent = '游戏结束!';
            document.getElementById('overlaySub').textContent = `得分: ${score}`;
            document.getElementById('overlay').style.display = 'flex';
            beep(120, 0.3, 'sawtooth', 0.05);
        }

        function showOverlay(title, sub) {
            document.getElementById('overlayTitle').textContent = title;
            document.getElementById('overlaySub').textContent = sub;
            document.getElementById('overlay').style.display = 'flex';
        }

        function hideOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }

        function togglePause() {
            if (gameOver) return;
            paused = !paused;
            if (paused) {
                showOverlay('已暂停', '按空格继续');
            } else {
                hideOverlay();
            }
        }

        function restartGame() {
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            initGame();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // 统一的方向设置（相对"待生效方向"防反向，避免快速连按反向的隐患）
        function setDirection(x, y) {
            if (gameOver) return;
            if (x !== 0 && nextDirection.x === -x) return;
            if (y !== 0 && nextDirection.y === -y) return;
            nextDirection = { x, y };
        }


        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':    e.preventDefault(); setDirection(0, -1); break;
                case 'ArrowDown':  e.preventDefault(); setDirection(0,  1); break;
                case 'ArrowLeft':  e.preventDefault(); setDirection(-1, 0); break;
                case 'ArrowRight': e.preventDefault(); setDirection(1,  0); break;
                case ' ':          e.preventDefault(); togglePause(); break;
                case 'r': case 'R': restartGame(); break;
            }
        });

        // 触摸滑动支持（移动端）
        const snakeCanvas = document.getElementById('gameCanvas');
        let sTouchX = 0, sTouchY = 0;
        snakeCanvas.addEventListener('touchstart', (e) => {
            sTouchX = e.changedTouches[0].clientX;
            sTouchY = e.changedTouches[0].clientY;
        }, { passive: true });
        snakeCanvas.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - sTouchX;
            const dy = e.changedTouches[0].clientY - sTouchY;
            const ax = Math.abs(dx), ay = Math.abs(dy);
            if (Math.max(ax, ay) < 24) return;          // 滑动阈值
            if (ax > ay) setDirection(dx > 0 ? 1 : -1, 0);
            else setDirection(0, dy > 0 ? 1 : -1);
        }, { passive: true });

        // 虚拟方向键（移动端）
        document.getElementById('dpad').addEventListener('click', (e) => {
            const dir = e.target.getAttribute('data-dir');
            if (!dir) return;
            const map = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };
            setDirection(map[dir][0], map[dir][1]);
        });

        // 初始化
        best = parseInt(localStorage.getItem('snakeBest') || '0', 10);
        document.getElementById('best').textContent = best;
        initGame();
        gameLoopId = requestAnimationFrame(gameLoop);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
