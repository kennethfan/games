<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="description" content="拯救女神小游戏：移动木块，护送女神从底部出口逃脱，经典益智解谜，纯前端、打开即玩。" />
    <meta name="theme-color" content="#0f1117" />
    <link rel="stylesheet" href="assets/common.css" />
    <script src="assets/common.js"></script>
    <title>拯救女神</title>
    <style>
        .board {
            position: relative;
            width: 384px;            /* 4*(84) + 3*(8) + 2*(12) */
            height: 476px;           /* 5*(84) + 4*(8) + 2*(12) */
            background: var(--bg-soft);
            padding: 0;
            border-radius: 10px;
            touch-action: none;      /* 防止移动端拖动时页面滚动 */
        }

        /* 底层棋盘格 */
        .cell-layer {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(4, 84px);
            grid-template-rows: repeat(5, 84px);
            gap: 8px;
            padding: 12px;
        }
        .cell {
            background: #11162a;
            border-radius: 8px;
        }

        /* 木块层（绝对定位，靠 translate 滑动） */
        .piece-layer {
            position: absolute;
            inset: 12px;
            pointer-events: none;
        }
        .piece {
            position: absolute;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            border: 2px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.35);
            transition: transform 0.12s ease-in-out;
            user-select: none;
            -webkit-user-select: none;
        }
        .piece:active { filter: brightness(1.12); }
        .pname {
            font-weight: 800;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
            pointer-events: none;
            font-size: 26px;
            letter-spacing: 1px;
        }
        .piece.vert .pname { writing-mode: vertical-rl; font-size: 22px; letter-spacing: 3px; }
        .piece.cao .pname  { font-size: 34px; }

        /* 棋子配色（女神突出、关羽绿、四将蓝紫家族、兵灰蓝） */
        .piece.cao   { background: linear-gradient(135deg, #ff7a7a, #ff5c5c); }
        .piece.guan  { background: linear-gradient(135deg, #3ed598, #28a06f); }
        .piece.p1    { background: linear-gradient(135deg, #6c8cff, #4a6cff); }
        .piece.p2    { background: linear-gradient(135deg, #7d7bff, #5a5aff); }
        .piece.p3    { background: linear-gradient(135deg, #9b6cff, #7a4cff); }
        .piece.p4    { background: linear-gradient(135deg, #b56cff, #9b4cff); }
        .piece.bing  { background: #2a3550; }
        .piece.bing .pname { color: #aeb8d4; font-size: 24px; }

        /* 出口提示（底部中线） */
        .exit-hint {
            position: absolute;
            left: 50%;
            bottom: -2px;
            transform: translateX(-50%);
            color: var(--text-dim);
            font-size: 12px;
            pointer-events: none;
        }

        /* 关卡选择条 */
        .level-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 2px 2px 10px;
            -webkit-overflow-scrolling: touch;
        }
        .level-tab {
            flex: 0 0 auto;
            background: #232a44;
            color: #c7cfe8;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            padding: 8px 18px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s ease;
        }
        .level-tab.active {
            background: linear-gradient(135deg, #6c8cff, #b56cff);
            color: #fff;
            border-color: transparent;
            font-weight: 700;
        }
        .level-tab:active { filter: brightness(1.1); }

        @media (max-width: 520px) {
            .board { transform: scale(0.82); transform-origin: top center; }
        }
    </style>
</head>
<body>
    <div class="game-wrap">
        <header class="game-header">
            <a class="back-link" href="index.html">← 返回</a>
            <h1 class="game-title">拯救女神</h1>
            <button id="soundBtn" class="icon-btn" onclick="toggleSound()">🔊</button>
        </header>

        <section class="game-stats">
            <div class="stat"><div class="stat-label">步数</div><div class="stat-value stat-score" id="moves">0</div></div>
            <div class="stat"><div class="stat-label">最佳</div><div class="stat-value stat-best" id="best">—</div></div>
            <div class="stat"><div class="stat-label">关卡</div><div class="stat-value" id="levelName" style="font-size:18px;">横刀立马</div></div>
            <div class="stat"><div class="stat-label">最少步</div><div class="stat-value stat-best" id="minSteps">—</div></div>
        </section>

        <div class="level-tabs" id="levelTabs"></div>

        <section class="game-stage">
            <div class="board" id="board">
                <div class="cell-layer" id="cellLayer">
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                </div>
                <div class="piece-layer" id="pieceLayer"></div>
                <div class="exit-hint">▼ 女神逃出此口 ▼</div>
                <!-- 胜利遮罩 -->
                <div class="game-overlay" id="overlay" style="display: none;">
                    <div class="game-overlay-title win" id="overlayTitle"></div>
                    <div class="game-overlay-sub" id="overlaySub"></div>
                    <button onclick="restart()">再来一局</button>
                </div>
            </div>
        </section>

        <footer class="game-toolbar">
            <div class="hint">点击木块，朝<text class="b">你点的那一侧</text>滑入空位，把<text class="b">女神</text>送到下方出口</div>
            <button onclick="restart()">重新开始</button>
        </footer>
    </div>

    <script>
        const ROWS = 5, COLS = 4;
        const CELL = 84, GAP = 8;
        const STEP = CELL + GAP;

        // 经典布局（坐标经 aauto 编码解码 + BFS 可解性校验）
        const LEVELS = {
            hdlm: {
                name: '横刀立马',
                minSteps: 116,
                pieces: [
                    { id: 'cao',   name: '女神', rows: 2, cols: 2, r: 0, c: 1, cls: 'cao'  },
                    { id: 'guan',  name: '帅哥', rows: 1, cols: 2, r: 2, c: 1, cls: 'guan' },
                    { id: 'zhang', name: '老外', rows: 2, cols: 1, r: 0, c: 0, cls: 'p1'   },
                    { id: 'zhao',  name: '总裁', rows: 2, cols: 1, r: 0, c: 3, cls: 'p2'   },
                    { id: 'ma',    name: '渣男', rows: 2, cols: 1, r: 2, c: 0, cls: 'p3'   },
                    { id: 'huang', name: '黄毛', rows: 2, cols: 1, r: 2, c: 3, cls: 'p4'   },
                    { id: 'b1',    name: '舔狗',   rows: 1, cols: 1, r: 3, c: 1, cls: 'bing' },
                    { id: 'b2',    name: '舔狗',   rows: 1, cols: 1, r: 3, c: 2, cls: 'bing' },
                    { id: 'b3',    name: '舔狗',   rows: 1, cols: 1, r: 4, c: 0, cls: 'bing' },
                    { id: 'b4',    name: '舔狗',   rows: 1, cols: 1, r: 4, c: 3, cls: 'bing' }
                ]
            },
            zhihui: {
                name: '指挥若定',
                minSteps: 100,
                pieces: [
                    { id: 'cao',   name: '女神', rows: 2, cols: 2, r: 0, c: 1, cls: 'cao'  },
                    { id: 'huang', name: '黄毛', rows: 2, cols: 1, r: 0, c: 0, cls: 'p1'   },
                    { id: 'ma',    name: '渣男', rows: 2, cols: 1, r: 0, c: 3, cls: 'p2'   },
                    { id: 'guan',  name: '帅哥', rows: 1, cols: 2, r: 2, c: 1, cls: 'guan' },
                    { id: 'b1',    name: '舔狗',   rows: 1, cols: 1, r: 2, c: 0, cls: 'bing' },
                    { id: 'b2',    name: '舔狗',   rows: 1, cols: 1, r: 2, c: 3, cls: 'bing' },
                    { id: 'zhang', name: '老外', rows: 2, cols: 1, r: 3, c: 0, cls: 'p3'   },
                    { id: 'zhao',  name: '总裁', rows: 2, cols: 1, r: 3, c: 3, cls: 'p4'   },
                    { id: 'b3',    name: '舔狗',   rows: 1, cols: 1, r: 3, c: 1, cls: 'bing' },
                    { id: 'b4',    name: '舔狗',   rows: 1, cols: 1, r: 3, c: 2, cls: 'bing' }
                ]
            },
            bingfen: {
                name: '兵分三路',
                minSteps: 92,
                pieces: [
                    { id: 'b1',    name: '舔狗',   rows: 1, cols: 1, r: 0, c: 0, cls: 'bing' },
                    { id: 'cao',   name: '女神', rows: 2, cols: 2, r: 0, c: 1, cls: 'cao'  },
                    { id: 'b2',    name: '舔狗',   rows: 1, cols: 1, r: 0, c: 3, cls: 'bing' },
                    { id: 'zhang', name: '老外', rows: 2, cols: 1, r: 1, c: 0, cls: 'p1'   },
                    { id: 'zhao',  name: '总裁', rows: 2, cols: 1, r: 1, c: 3, cls: 'p2'   },
                    { id: 'guan',  name: '帅哥', rows: 1, cols: 2, r: 2, c: 1, cls: 'guan' },
                    { id: 'ma',    name: '渣男', rows: 2, cols: 1, r: 3, c: 0, cls: 'p3'   },
                    { id: 'huang', name: '黄毛', rows: 2, cols: 1, r: 3, c: 3, cls: 'p4'   },
                    { id: 'b3',    name: '舔狗',   rows: 1, cols: 1, r: 3, c: 1, cls: 'bing' },
                    { id: 'b4',    name: '舔狗',   rows: 1, cols: 1, r: 3, c: 2, cls: 'bing' }
                ]
            },
            qitou: {
                name: '齐头并进',
                minSteps: 85,
                pieces: [
                    { id: 'zhang', name: '老外', rows: 2, cols: 1, r: 0, c: 0, cls: 'p1'   },
                    { id: 'cao',   name: '女神', rows: 2, cols: 2, r: 0, c: 1, cls: 'cao'  },
                    { id: 'zhao',  name: '总裁', rows: 2, cols: 1, r: 0, c: 3, cls: 'p2'   },
                    { id: 'b1',    name: '舔狗',   rows: 1, cols: 1, r: 2, c: 0, cls: 'bing' },
                    { id: 'b2',    name: '舔狗',   rows: 1, cols: 1, r: 2, c: 1, cls: 'bing' },
                    { id: 'b3',    name: '舔狗',   rows: 1, cols: 1, r: 2, c: 2, cls: 'bing' },
                    { id: 'b4',    name: '舔狗',   rows: 1, cols: 1, r: 2, c: 3, cls: 'bing' },
                    { id: 'huang', name: '黄毛', rows: 2, cols: 1, r: 3, c: 0, cls: 'p3'   },
                    { id: 'guan',  name: '帅哥', rows: 1, cols: 2, r: 3, c: 1, cls: 'guan' },
                    { id: 'ma',    name: '渣男', rows: 2, cols: 1, r: 3, c: 3, cls: 'p4'   }
                ]
            },
            binglin: {
                name: '兵临曹营',
                minSteps: 49,
                pieces: [
                    { id: 'b1',    name: '舔狗',   rows: 1, cols: 1, r: 0, c: 0, cls: 'bing' },
                    { id: 'cao',   name: '女神', rows: 2, cols: 2, r: 0, c: 1, cls: 'cao'  },
                    { id: 'b2',    name: '舔狗',   rows: 1, cols: 1, r: 0, c: 3, cls: 'bing' },
                    { id: 'b3',    name: '舔狗',   rows: 1, cols: 1, r: 1, c: 0, cls: 'bing' },
                    { id: 'b4',    name: '舔狗',   rows: 1, cols: 1, r: 1, c: 3, cls: 'bing' },
                    { id: 'zhang', name: '老外', rows: 2, cols: 1, r: 2, c: 0, cls: 'p1'   },
                    { id: 'guan',  name: '帅哥', rows: 1, cols: 2, r: 2, c: 1, cls: 'guan' },
                    { id: 'zhao',  name: '总裁', rows: 2, cols: 1, r: 2, c: 3, cls: 'p2'   },
                    { id: 'huang', name: '黄毛', rows: 2, cols: 1, r: 3, c: 1, cls: 'p3'   },
                    { id: 'ma',    name: '渣男', rows: 2, cols: 1, r: 3, c: 2, cls: 'p4'   }
                ]
            }
        };
        const LEVEL_ORDER = ['hdlm', 'zhihui', 'bingfen', 'qitou', 'binglin'];

        // 胜利：女神占据底部出口四格
        const WIN_CELLS = ['3,1', '3,2', '4,1', '4,2'];

        const movesEl   = document.getElementById('moves');
        const bestEl    = document.getElementById('best');
        const levelEl   = document.getElementById('levelName');
        const overlay   = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlaySub   = document.getElementById('overlaySub');
        const pieceLayer   = document.getElementById('pieceLayer');
        const minEl        = document.getElementById('minSteps');

        let grid = [];          // ROWS x COLS，存 piece.id 或 0
        let pieces = [];        // 当前棋子（含实时 r,c,el）
        let moves = 0;
        let best = 0;
        let won = false;
        let currentLevel = 'hdlm';

        function cellsOf(p) {
            const out = [];
            for (let dr = 0; dr < p.rows; dr++)
                for (let dc = 0; dc < p.cols; dc++)
                    out.push([p.r + dr, p.c + dc]);
            return out;
        }

        function buildGrid() {
            grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
            pieces.forEach(p => cellsOf(p).forEach(([r, c]) => grid[r][c] = p.id));
        }

        function canMove(p, dr, dc) {
            return cellsOf(p).every(([r, c]) => {
                const nr = r + dr, nc = c + dc;
                if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return false;
                const occ = grid[nr][nc];
                return occ === 0 || occ === p.id;   // 目标为空或属于自身
            });
        }

        function isWin() {
            const cao = pieces.find(p => p.id === 'cao');
            const cur = cellsOf(cao).map(([r, c]) => r + ',' + c).sort().join('|');
            return cur === WIN_CELLS.slice().sort().join('|');
        }

        function positionPiece(p) {
            p.el.style.transform = `translate(${p.c * STEP}px, ${p.r * STEP}px)`;
        }

        function renderPiece(p) {
            p.el.style.width  = (p.cols * CELL + (p.cols - 1) * GAP) + 'px';
            p.el.style.height = (p.rows * CELL + (p.rows - 1) * GAP) + 'px';
            positionPiece(p);
        }

        function init(levelKey) {
            if (levelKey) currentLevel = levelKey;
            const lvl = LEVELS[currentLevel];
            levelEl.textContent = lvl.name;
            minEl.textContent = lvl.minSteps;
            pieceLayer.innerHTML = '';
            pieces = lvl.pieces.map(def => {
                const el = document.createElement('div');
                el.className = 'piece ' + def.cls + (def.rows > def.cols ? ' vert' : '');
                const span = document.createElement('span');
                span.className = 'pname';
                span.textContent = def.name;
                el.appendChild(span);
                const p = { ...def, el };
                el.addEventListener('click', (e) => onPieceClick(e, p));
                pieceLayer.appendChild(el);
                return p;
            });
            buildGrid();
            moves = 0;
            won = false;
            movesEl.textContent = '0';
            best = parseInt(localStorage.getItem('bestHuarong_' + currentLevel) || '0', 10) || 0;
            bestEl.textContent = best === 0 ? '—' : best;
            hideOverlay();
            pieces.forEach(renderPiece);
            renderLevelTabs();
        }

        function renderLevelTabs() {
            const tabs = document.getElementById('levelTabs');
            if (!tabs) return;
            tabs.innerHTML = '';
            LEVEL_ORDER.forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'level-tab' + (key === currentLevel ? ' active' : '');
                btn.textContent = LEVELS[key].name;
                btn.addEventListener('click', () => { if (!won) selectLevel(key); });
                tabs.appendChild(btn);
            });
        }

        function selectLevel(key) {
            init(key);
        }

        // 根据点击位置决定首选方向：朝被点的那一侧滑
        function onPieceClick(e, p) {
            if (won || animating) return;
            const rect = p.el.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const dx = e.clientX - cx, dy = e.clientY - cy;
            let pref;
            if (Math.abs(dx) > Math.abs(dy)) pref = dx > 0 ? 'right' : 'left';
            else pref = dy > 0 ? 'down' : 'up';

            const map = {
                up:    [-1, 0], down: [1, 0],
                left:  [0, -1], right: [0, 1]
            };
            const order = pref === 'left' || pref === 'right'
                ? [pref, 'up', 'down']
                : [pref, 'left', 'right'];

            for (const dir of order) {
                const [dr, dc] = map[dir];
                if (canMove(p, dr, dc)) { doMove(p, dr, dc); return; }
            }
        }

        let animating = false;
        function doMove(p, dr, dc) {
            // 更新占用图
            cellsOf(p).forEach(([r, c]) => { if (grid[r][c] === p.id) grid[r][c] = 0; });
            p.r += dr; p.c += dc;
            cellsOf(p).forEach(([r, c]) => { grid[r][c] = p.id; });

            animating = true;
            positionPiece(p);
            moves++;
            movesEl.textContent = moves;
            beep(440, 0.05, 'sine', 0.03);

            setTimeout(() => {
                animating = false;
                if (isWin()) onWin();
            }, 130);
        }

        function onWin() {
            won = true;
            const min = LEVELS[currentLevel].minSteps;
            let msg;
            if (moves <= min) {
                msg = '🏆 完美！仅用 ' + moves + ' 步达到最少步数！';
            } else {
                msg = '用 ' + moves + ' 步让女神脱身！（参考最少 ' + min + ' 步）';
            }
            const isNew = (best === 0 || moves < best);
            if (isNew) {
                best = moves;
                bestEl.textContent = best;
                try { localStorage.setItem('bestHuarong_' + currentLevel, best); } catch (e) {}
                if (moves > min) msg += ' 🎉 新纪录！';
            }
            showOverlay('胜利!', msg, 'win');
            beep(880, 0.2, 'square', 0.05);
            setTimeout(() => beep(1175, 0.22, 'square', 0.05), 160);
        }

        function showOverlay(title, sub) {
            overlayTitle.textContent = title;
            overlaySub.textContent = sub;
            overlay.style.display = 'flex';
        }
        function hideOverlay() { overlay.style.display = 'none'; }
        function restart() { init(); }

        // 初始化
        try { best = parseInt(localStorage.getItem('bestHuarong') || '0', 10); } catch (e) {}
        bestEl.textContent = best === 0 ? '—' : best;
        init();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
