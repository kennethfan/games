<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background: #16213e;
            padding: 22px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .title {
            font-size: 44px;
            font-weight: bold;
            color: #00d4ff;
            letter-spacing: 1px;
        }

        .scores { display: flex; gap: 10px; }

        .score-box {
            background: #0f3460;
            padding: 8px 18px;
            border-radius: 8px;
            text-align: center;
            min-width: 70px;
        }

        .score-label { font-size: 12px; color: #9db4d6; }
        .score-value { font-size: 22px; font-weight: bold; color: #ffd93d; }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .hint { font-size: 13px; color: #9db4d6; }
        .hint b { color: #00d4ff; }

        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover { background: #ff6b6b; transform: translateY(-2px); }

        .board {
            position: relative;
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 12px;
            background: #0f3460;
            padding: 12px;
            border-radius: 10px;
        }

        /* 底层灰色背景格 */
        .cell {
            width: 80px;
            height: 80px;
            background: #16213e;
            border-radius: 6px;
        }

        /* 瓦片层：覆盖在背景格之上，绝对定位 */
        .tile-layer {
            position: absolute;
            inset: 12px;
            pointer-events: none;
        }

        /* 外层只负责平移定位，过渡产生滑动感 */
        .tile {
            position: absolute;
            width: 80px;
            height: 80px;
            transition: transform 0.11s ease-in-out;
        }

        /* 内层负责显示与弹出动画，避免与外层 transform 冲突 */
        .tile-inner {
            width: 100%;
            height: 100%;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 32px;
        }

        .tile-inner.appear { animation: appear 0.14s ease; }
        @keyframes appear {
            from { opacity: 0; transform: scale(0); }
            to   { opacity: 1; transform: scale(1); }
        }

        .tile-inner.pop { animation: pop 0.18s ease; }
        @keyframes pop {
            0%   { transform: scale(0); }
            55%  { transform: scale(1.18); }
            100% { transform: scale(1); }
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 52, 96, 0.85);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .overlay-title { font-size: 40px; font-weight: bold; color: #ffd93d; margin-bottom: 12px; }
        .overlay-sub { font-size: 18px; color: #eee; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">2048</div>
            <div class="scores">
                <div class="score-box">
                    <div class="score-label">得分</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最佳</div>
                    <div class="score-value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <div class="hint">方向键 / <b>WASD</b> 滑动合并，凑出 <b>2048</b>！</div>
            <button onclick="restart()">重新开始</button>
        </div>

        <div class="board" id="board">
            <!-- 16 个背景格 -->
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <!-- 瓦片层（数字方块在此滑动） -->
            <div class="tile-layer" id="tileLayer"></div>
            <!-- 结束/胜利遮罩 -->
            <div class="overlay" id="overlay" style="display: none;">
                <div class="overlay-title" id="overlayTitle"></div>
                <div class="overlay-sub" id="overlaySub"></div>
                <button onclick="restart()">再来一局</button>
            </div>
        </div>
    </div>

    <script>
        const SIZE = 4;
        const SLIDE_MS = 110;            // 滑动动画时长（与 CSS transition 匹配）
        const CELL = 80;                 // 格子边长
        const GAP = 12;                  // 格子间距
        const STEP = CELL + GAP;         // 相邻格中心步长 = 92px

        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlaySub = document.getElementById('overlaySub');
        const tileLayer = document.getElementById('tileLayer');

        let tiles = [];                  // 所有存活的方块（带唯一引用）
        let score = 0;
        let best = 0;
        let won = false;
        let over = false;
        let animating = false;           // 动画期间锁，防止快速连按导致状态错乱

        // 经典 2048 配色
        const COLORS = {
            2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
            32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',
            512: '#edc850', 1024: '#edc53f', 2048: '#edc22e'
        };

        function colorFor(v) {
            if (v === 0) return '#16213e';
            return COLORS[v] || '#3c3a32';
        }
        function textColor(v) {
            return v > 0 && v <= 4 ? '#776e65' : '#f9f6f2';
        }
        function fontSizeFor(v) {
            const len = String(v).length;
            return len <= 2 ? '32px' : len === 3 ? '26px' : '20px';
        }

        // 根据 (行,列) 计算外层瓦片的平移坐标
        function positionTile(t) {
            t.el.style.transform = `translate(${t.c * STEP}px, ${t.r * STEP}px)`;
        }

        // 创建一个方块（isNew=true 时播放淡入弹出动画）
        function createTile(r, c, value, isNew) {
            const el = document.createElement('div');
            el.className = 'tile';

            const inner = document.createElement('div');
            inner.className = 'tile-inner';
            inner.textContent = value;
            inner.style.background = colorFor(value);
            inner.style.color = textColor(value);
            inner.style.fontSize = fontSizeFor(value);

            el.appendChild(inner);
            el.style.transform = `translate(${c * STEP}px, ${r * STEP}px)`;
            tileLayer.appendChild(el);

            const t = { value, r, c, el, inner };
            tiles.push(t);
            if (isNew) inner.classList.add('appear');
            return t;
        }

        function removeTile(t) {
            const i = tiles.indexOf(t);
            if (i >= 0) tiles.splice(i, 1);
            if (t.el && t.el.parentNode) t.el.parentNode.removeChild(t.el);
        }

        // 方向 -> 物理坐标：i 为线索引，j 为该线上位置(0 为移动方向最前)
        function cellRC(i, dir, j) {
            if (dir === 'left')  return { r: i, c: j };
            if (dir === 'right') return { r: i, c: SIZE - 1 - j };
            if (dir === 'up')    return { r: j, c: i };
            if (dir === 'down')  return { r: SIZE - 1 - j, c: i };
        }

        // 收集某条线上的方块（按移动方向顺序，最前在前）
        function lineTiles(i, dir) {
            const arr = [];
            for (let j = 0; j < SIZE; j++) {
                const { r, c } = cellRC(i, dir, j);
                const t = tiles.find(t => t.r === r && t.c === c);
                if (t) arr.push(t);
            }
            return arr;
        }

        function init() {
            tiles.forEach(t => { if (t.el.parentNode) t.el.parentNode.removeChild(t.el); });
            tiles = [];
            score = 0;
            won = false;
            over = false;
            animating = false;
            scoreEl.textContent = '0';
            hideOverlay();
            spawn();
            spawn();
        }

        function spawn() {
            const empty = [];
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++)
                    if (!tiles.some(t => t.r === r && t.c === c)) empty.push([r, c]);
            if (empty.length === 0) return;
            const [r, c] = empty[Math.floor(Math.random() * empty.length)];
            createTile(r, c, Math.random() < 0.9 ? 2 : 4, true);
        }

        function move(dir) {
            if (over || animating) return;
            if (won) hideOverlay(); // 胜利后可继续挑战

            let moved = false;
            let gained = 0;
            const merges = [];   // 待合并的项：{r,c,value,a,b}

            for (let i = 0; i < SIZE; i++) {
                const lt = lineTiles(i, dir);
                let tgt = 0;
                for (let k = 0; k < lt.length; k++) {
                    const pos = cellRC(i, dir, tgt);
                    if (k + 1 < lt.length && lt[k].value === lt[k + 1].value) {
                        // 合并 lt[k] 与 lt[k+1]
                        lt[k].r = pos.r;   lt[k].c = pos.c;
                        lt[k + 1].r = pos.r; lt[k + 1].c = pos.c;
                        merges.push({ r: pos.r, c: pos.c, value: lt[k].value * 2, a: lt[k], b: lt[k + 1] });
                        gained += lt[k].value * 2;
                        moved = true;
                        k++;
                    } else {
                        if (lt[k].r !== pos.r || lt[k].c !== pos.c) moved = true;
                        lt[k].r = pos.r; lt[k].c = pos.c;
                    }
                    tgt++;
                }
            }

            if (!moved) return;

            animating = true;
            // 触发滑动过渡
            tiles.forEach(positionTile);

            // 更新分数
            score += gained;
            scoreEl.textContent = score;
            if (score > best) {
                best = score;
                bestEl.textContent = best;
                try { localStorage.setItem('best2048', best); } catch (e) {}
            }

            // 滑动结束后落定：移除合并源方块、生成合并结果、生成新方块、判定状态
            setTimeout(() => {
                merges.forEach(m => {
                    removeTile(m.a);
                    removeTile(m.b);
                    createTile(m.r, m.c, m.value, true); // 合并结果方块，带弹出动画
                });
                spawn();
                rebuildBoardAndCheck();
                animating = false;
            }, SLIDE_MS);
        }

        function rebuildBoardAndCheck() {
            const board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            tiles.forEach(t => board[t.r][t.c] = t.value);

            if (!won && board.flat().includes(2048)) {
                won = true;
                showOverlay('你赢了!', '按方向键继续挑战');
            } else if (!hasMoves(board)) {
                over = true;
                showOverlay('游戏结束', '得分 ' + score);
            }
        }

        function hasMoves(b) {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (b[r][c] === 0) return true;
                    if (c < SIZE - 1 && b[r][c] === b[r][c + 1]) return true;
                    if (r < SIZE - 1 && b[r][c] === b[r + 1][c]) return true;
                }
            }
            return false;
        }

        function showOverlay(title, sub) {
            overlayTitle.textContent = title;
            overlaySub.textContent = sub;
            overlay.style.display = 'flex';
        }
        function hideOverlay() {
            overlay.style.display = 'none';
        }
        function restart() {
            init();
        }

        document.addEventListener('keydown', (e) => {
            const map = {
                ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                w: 'up', s: 'down', a: 'left', d: 'right',
                W: 'up', S: 'down', A: 'left', D: 'right'
            };
            if (map[e.key]) {
                e.preventDefault();
                move(map[e.key]);
            }
        });

        // 初始化
        try { best = parseInt(localStorage.getItem('best2048') || '0', 10); } catch (e) {}
        bestEl.textContent = best;
        init();
    </script>
</body>
</html>
