<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="description" content="2048 小游戏：滑动合并相同数字拼到 2048，纯前端、支持键盘与触摸、打开即玩。" />
    <meta name="theme-color" content="#0f1117" />
    <link rel="stylesheet" href="assets/common.css" />
    <script src="assets/common.js"></script>
    <title>2048</title>
    <style>
    



        .board {
            position: relative;
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 12px;
            background: var(--bg-soft);
            padding: 12px;
            border-radius: 10px;
            touch-action: none;        /* 防止移动端滑动时页面滚动 */
        }

        /* 底层灰色背景格 */
        .cell {
            width: 80px;
            height: 80px;
            background: #11162a;
            border-radius: 6px;
        }
        .tile-layer {
            position: absolute;
            inset: 12px;
            pointer-events: none;
        }

        /* 外层只负责平移定位，过渡产生滑动感 */
        .tile {
            position: absolute;
            width: 80px;
            height: 80px;
            transition: transform 0.11s ease-in-out;
        }

        /* 内层负责显示与弹出动画，避免与外层 transform 冲突 */
        .tile-inner {
            width: 100%;
            height: 100%;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 32px;
        }

        .tile-inner.appear { animation: appear 0.14s ease; }
        @keyframes appear {
            from { opacity: 0; transform: scale(0); }
            to   { opacity: 1; transform: scale(1); }
        }

        .tile-inner.pop { animation: pop 0.18s ease; }
        @keyframes pop {
            0%   { transform: scale(0); }
            55%  { transform: scale(1.18); }
            100% { transform: scale(1); }
        }

        /* 移动端：棋盘缩放以适配小屏（断点与 common 统一 520px） */
        @media (max-width: 520px) {
            .board { transform: scale(0.88); transform-origin: top center; }
        }
    </style>
</head>
<body>
    <div class="game-wrap">
        <header class="game-header">
            <a class="back-link" href="index.html">← 返回</a>
            <h1 class="game-title">2048</h1>
            <button id="soundBtn" class="icon-btn" onclick="toggleSound()">🔊</button>
        </header>

        <section class="game-stats">
            <div class="stat"><div class="stat-label">得分</div><div class="stat-value stat-score" id="score">0</div></div>
            <div class="stat"><div class="stat-label">最高</div><div class="stat-value stat-best" id="best">0</div></div>
        </section>

        <section class="game-stage">
            <div class="board" id="board">
            <!-- 16 个背景格 -->
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <!-- 瓦片层（数字方块在此滑动） -->
            <div class="tile-layer" id="tileLayer"></div>
            <!-- 结束/胜利遮罩 -->
            <div class="game-overlay" id="overlay" style="display: none;">
                <div class="game-overlay-title fail" id="overlayTitle"></div>
                <div class="game-overlay-sub" id="overlaySub"></div>
                <button onclick="restart()">再来一局</button>
            </div>
        </div>
        </section>

        <footer class="game-toolbar">
            <div class="hint">方向键 / <b>WASD</b> 滑动合并，凑出 <b>2048</b>（手机可滑动）</div>
            <button onclick="restart()">重新开始</button>
        </footer>
    </div>

    <script>
        const SIZE = 4;
        const SLIDE_MS = 110;            // 滑动动画时长（与 CSS transition 匹配）
        const CELL = 80;                 // 格子边长
        const GAP = 12;                  // 格子间距
        const STEP = CELL + GAP;         // 相邻格中心步长 = 92px

        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlaySub = document.getElementById('overlaySub');
        const tileLayer = document.getElementById('tileLayer');

        let tiles = [];                  // 所有存活的方块（带唯一引用）
        let score = 0;
        let best = 0;
        let won = false;
        let over = false;
        let animating = false;           // 动画期间锁，防止快速连按导致状态错乱

        // 蓝紫家族渐变配色（与全站统一）
        const COLORS = {
            2: '#34406e', 4: '#3f4d8c', 8: '#4d5fb0', 16: '#6c8cff',
            32: '#7d7bff', 64: '#9b6cff', 128: '#b56cff', 256: '#c56cd0',
            512: '#d76cae', 1024: '#ff7eb6', 2048: '#ff9ec4'
        };

        function colorFor(v) {
            if (v === 0) return '#11162a';
            return COLORS[v] || '#3c3a32';
        }
        function textColor(v) {
            return '#eef2ff';
        }
        function fontSizeFor(v) {
            const len = String(v).length;
            return len <= 2 ? '32px' : len === 3 ? '26px' : '20px';
        }

        // 根据 (行,列) 计算外层瓦片的平移坐标
        function positionTile(t) {
            t.el.style.transform = `translate(${t.c * STEP}px, ${t.r * STEP}px)`;
        }

        // 创建一个方块（isNew=true 时播放淡入弹出动画）
        function createTile(r, c, value, isNew) {
            const el = document.createElement('div');
            el.className = 'tile';

            const inner = document.createElement('div');
            inner.className = 'tile-inner';
            inner.textContent = value;
            inner.style.background = colorFor(value);
            inner.style.color = textColor(value);
            inner.style.fontSize = fontSizeFor(value);

            el.appendChild(inner);
            el.style.transform = `translate(${c * STEP}px, ${r * STEP}px)`;
            tileLayer.appendChild(el);

            const t = { value, r, c, el, inner };
            tiles.push(t);
            if (isNew) inner.classList.add('appear');
            return t;
        }

        function removeTile(t) {
            const i = tiles.indexOf(t);
            if (i >= 0) tiles.splice(i, 1);
            if (t.el && t.el.parentNode) t.el.parentNode.removeChild(t.el);
        }

        // 方向 -> 物理坐标：i 为线索引，j 为该线上位置(0 为移动方向最前)
        function cellRC(i, dir, j) {
            if (dir === 'left')  return { r: i, c: j };
            if (dir === 'right') return { r: i, c: SIZE - 1 - j };
            if (dir === 'up')    return { r: j, c: i };
            if (dir === 'down')  return { r: SIZE - 1 - j, c: i };
        }

        // 收集某条线上的方块（按移动方向顺序，最前在前）
        function lineTiles(i, dir) {
            const arr = [];
            for (let j = 0; j < SIZE; j++) {
                const { r, c } = cellRC(i, dir, j);
                const t = tiles.find(t => t.r === r && t.c === c);
                if (t) arr.push(t);
            }
            return arr;
        }

        function init() {
            tiles.forEach(t => { if (t.el.parentNode) t.el.parentNode.removeChild(t.el); });
            tiles = [];
            score = 0;
            won = false;
            over = false;
            animating = false;
            scoreEl.textContent = '0';
            hideOverlay();
            spawn();
            spawn();
        }

        function spawn() {
            const empty = [];
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++)
                    if (!tiles.some(t => t.r === r && t.c === c)) empty.push([r, c]);
            if (empty.length === 0) return;
            const [r, c] = empty[Math.floor(Math.random() * empty.length)];
            createTile(r, c, Math.random() < 0.9 ? 2 : 4, true);
        }

        function move(dir) {
            if (over || animating) return;
            if (won) hideOverlay(); // 胜利后可继续挑战

            let moved = false;
            let gained = 0;
            const merges = [];   // 待合并的项：{r,c,value,a,b}

            for (let i = 0; i < SIZE; i++) {
                const lt = lineTiles(i, dir);
                let tgt = 0;
                for (let k = 0; k < lt.length; k++) {
                    const pos = cellRC(i, dir, tgt);
                    if (k + 1 < lt.length && lt[k].value === lt[k + 1].value) {
                        // 合并 lt[k] 与 lt[k+1]
                        lt[k].r = pos.r;   lt[k].c = pos.c;
                        lt[k + 1].r = pos.r; lt[k + 1].c = pos.c;
                        merges.push({ r: pos.r, c: pos.c, value: lt[k].value * 2, a: lt[k], b: lt[k + 1] });
                        gained += lt[k].value * 2;
                        moved = true;
                        k++;
                    } else {
                        if (lt[k].r !== pos.r || lt[k].c !== pos.c) moved = true;
                        lt[k].r = pos.r; lt[k].c = pos.c;
                    }
                    tgt++;
                }
            }

            if (!moved) return;

            animating = true;
            // 触发滑动过渡
            tiles.forEach(positionTile);

            // 更新分数
            score += gained;
            scoreEl.textContent = score;
            if (gained > 0) beep(520, 0.08, 'square', 0.04);
            if (score > best) {
                best = score;
                bestEl.textContent = best;
                try { localStorage.setItem('best2048', best); } catch (e) {}
            }

            // 滑动结束后落定：移除合并源方块、生成合并结果、生成新方块、判定状态
            setTimeout(() => {
                merges.forEach(m => {
                    removeTile(m.a);
                    removeTile(m.b);
                    createTile(m.r, m.c, m.value, true); // 合并结果方块，带弹出动画
                });
                spawn();
                rebuildBoardAndCheck();
                animating = false;
            }, SLIDE_MS);
        }

        function rebuildBoardAndCheck() {
            const board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            tiles.forEach(t => board[t.r][t.c] = t.value);

            if (!won && board.flat().includes(2048)) {
                won = true;
                showOverlay('你赢了!', '按方向键继续挑战', 'win');
                beep(880, 0.18, 'square', 0.05);
            } else if (!hasMoves(board)) {
                over = true;
                showOverlay('游戏结束', '得分 ' + score, 'fail');
                beep(120, 0.3, 'sawtooth', 0.05);
            }
        }

        function hasMoves(b) {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (b[r][c] === 0) return true;
                    if (c < SIZE - 1 && b[r][c] === b[r][c + 1]) return true;
                    if (r < SIZE - 1 && b[r][c] === b[r + 1][c]) return true;
                }
            }
            return false;
        }

        function showOverlay(title, sub, type) {
            overlayTitle.textContent = title;
            overlayTitle.className = 'game-overlay-title ' + (type || 'fail');
            overlaySub.textContent = sub;
            overlay.style.display = 'flex';
        }
        function hideOverlay() {
            overlay.style.display = 'none';
        }
        function restart() {
            init();
        }

        document.addEventListener('keydown', (e) => {
            const map = {
                ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                w: 'up', s: 'down', a: 'left', d: 'right',
                W: 'up', S: 'down', A: 'left', D: 'right'
            };
            if (map[e.key]) {
                e.preventDefault();
                move(map[e.key]);
            }
        });

        // 触摸滑动支持（移动端）
        const boardEl = document.getElementById('board');
        let touchX = 0, touchY = 0;
        boardEl.addEventListener('touchstart', (e) => {
            touchX = e.changedTouches[0].clientX;
            touchY = e.changedTouches[0].clientY;
        }, { passive: true });
        boardEl.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchX;
            const dy = e.changedTouches[0].clientY - touchY;
            const ax = Math.abs(dx), ay = Math.abs(dy);
            if (Math.max(ax, ay) < 24) return;      // 滑动阈值
            if (ax > ay) move(dx > 0 ? 'right' : 'left');
            else move(dy > 0 ? 'down' : 'up');
        }, { passive: true });


        // 初始化
        try { best = parseInt(localStorage.getItem('best2048') || '0', 10); } catch (e) {}
        bestEl.textContent = best;
        init();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
