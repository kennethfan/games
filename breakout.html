<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="description" content="打砖块小游戏：移动挡板反弹小球击碎所有砖块，支持鼠标与触摸。" />
    <meta name="theme-color" content="#0f1117" />
    <link rel="stylesheet" href="assets/common.css" />
    <script src="assets/common.js"></script>
    <title>打砖块</title>
    <style>
    



        .game-board { position: relative; }

        canvas {
            background: var(--board-bg);
            cursor: none;
            display: block;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="game-wrap">
        <header class="game-header">
            <a class="back-link" href="index.html">← 返回</a>
            <h1 class="game-title">打砖块</h1>
            <button id="soundBtn" class="icon-btn" onclick="toggleSound()">🔊</button>
        </header>

        <section class="game-stats">
            <div class="stat"><div class="stat-label">得分</div><div class="stat-value stat-score" id="score">0</div></div>
            <div class="stat"><div class="stat-label">关卡</div><div class="stat-value" id="level">1</div></div>
            <div class="stat"><div class="stat-label">生命</div><div class="stat-value stat-danger" id="lives">♥♥♥</div></div>
        </section>

        <section class="game-stage">
            <div class="game-board">
                <canvas id="game" width="480" height="520"></canvas>
                <div class="game-overlay" id="overlay" style="display:none;">
                    <div class="game-overlay-title" id="overlayTitle"></div>
                    <div class="game-overlay-sub muted" id="overlaySub"></div>
                    <button id="overlayBtn" onclick="restart()" style="display:none;">重新开始</button>
                </div>
            </div>
        </section>

        <footer class="game-toolbar">
            <div class="hint"><b>← →</b> / <b>A D</b> / 鼠标移动挡板，<b>空格</b>或点击发射，<b>P</b> 暂停（触摸可拖动挡板）</div>
            <button onclick="restart()">重新开始</button>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const livesEl = document.getElementById('lives');

        // 游戏常量
        const W = canvas.width;            // 画布宽
        const H = canvas.height;           // 画布高
        const PADDLE_W = 90;               // 挡板宽
        const PADDLE_H = 12;               // 挡板高
        const PADDLE_SPEED = 7;            // 挡板键盘移动速度
        const BALL_R = 7;                  // 球半径
        const BRICK_ROWS = 5;              // 砖块行数
        const BRICK_COLS = 9;              // 砖块列数
        const BRICK_H = 18;                // 砖块高
        const BRICK_GAP = 4;               // 砖块间距
        const TOP_OFFSET = 45;             // 砖块区距顶部
        const SIDE_MARGIN = 15;            // 砖块区左右边距
        const MAX_LIVES = 3;

        // 每行砖块颜色与分值
        const ROW_COLORS = ['#b56cff', '#9b6cff', '#7d7bff', '#6c8cff', '#5ad1e6'];
        const ROW_POINTS = [50, 40, 30, 20, 10];

        let score, level, lives;
        let state;                         // 'ready' | 'playing' | 'paused' | 'over'
        let paddle;                        // { x, y, w, h }
        let ball;                          // { x, y, vx, vy, stuck }
        let bricks;                        // 砖块数组
        let ballSpeed;                     // 当前球速（每关递增）
        const keys = {};                   // 记录按下的键

        function resetBall() {
            ball = {
                x: paddle.x + paddle.w / 2,
                y: paddle.y - BALL_R - 2,
                vx: 0,
                vy: 0,
                stuck: true
            };
        }

        function launchBall() {
            if (!ball.stuck) return;
            ball.stuck = false;
            beep(500, 0.05, 'square', 0.04);
            // 以略微偏上的角度发射
            ball.vx = ballSpeed * 0.35;
            ball.vy = -ballSpeed * 0.94;
        }

        function buildBricks() {
            bricks = [];
            const totalW = W - SIDE_MARGIN * 2;
            const bw = (totalW - BRICK_GAP * (BRICK_COLS - 1)) / BRICK_COLS;
            for (let r = 0; r < BRICK_ROWS; r++) {
                for (let c = 0; c < BRICK_COLS; c++) {
                    bricks.push({
                        x: SIDE_MARGIN + c * (bw + BRICK_GAP),
                        y: TOP_OFFSET + r * (BRICK_H + BRICK_GAP),
                        w: bw,
                        h: BRICK_H,
                        color: ROW_COLORS[r % ROW_COLORS.length],
                        points: ROW_POINTS[r % ROW_POINTS.length],
                        alive: true
                    });
                }
            }
        }

        function init() {
            score = 0;
            level = 1;
            lives = MAX_LIVES;
            ballSpeed = 4.2;
            state = 'ready';
            paddle = { x: (W - PADDLE_W) / 2, y: H - 32, w: PADDLE_W, h: PADDLE_H };
            buildBricks();
            resetBall();
            updateHud();
        }

        function updateHud() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            livesEl.textContent = '♥'.repeat(Math.max(lives, 0)) || '—';
        }

        // 挡板左右移动（键盘）
        function movePaddle() {
            let dir = 0;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) dir -= 1;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) dir += 1;
            paddle.x += dir * PADDLE_SPEED;
            paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
        }

        // 碰撞处理：球与单个砖块，返回是否命中
        function hitBrick(b) {
            if (!b.alive) return false;
            if (ball.x + BALL_R < b.x || ball.x - BALL_R > b.x + b.w) return false;
            if (ball.y + BALL_R < b.y || ball.y - BALL_R > b.y + b.h) return false;

            // 用上一帧位置判断反弹方向，避免穿透误判
            const prevX = ball.x - ball.vx;
            const prevY = ball.y - ball.vy;
            const fromTop = prevY + BALL_R <= b.y;
            const fromBottom = prevY - BALL_R >= b.y + b.h;
            const fromLeft = prevX + BALL_R <= b.x;
            const fromRight = prevX - BALL_R >= b.x + b.w;

            if (fromTop || fromBottom) ball.vy = -ball.vy;
            else if (fromLeft || fromRight) ball.vx = -ball.vx;
            else { ball.vx = -ball.vx; ball.vy = -ball.vy; }

            b.alive = false;
            score += b.points;
            beep(300 + b.points, 0.05, 'square', 0.04);
            return true;
        }

        function update() {
            if (state !== 'playing' && state !== 'ready') return;

            movePaddle();

            if (ball.stuck) {
                // 等待发射：球粘在挡板上随其移动
                ball.x = paddle.x + paddle.w / 2;
                ball.y = paddle.y - BALL_R - 2;
                return;
            }

            // 移动球
            ball.x += ball.vx;
            ball.y += ball.vy;

            // 墙壁碰撞
            if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx = -ball.vx; }
            if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx = -ball.vx; }
            if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.vy = -ball.vy; }

            // 掉出底部：扣命
            if (ball.y - BALL_R > H) {
                lives--;
                updateHud();
                beep(200, 0.15, 'sawtooth', 0.05);
                if (lives <= 0) {
                    state = 'over';
                beep(120, 0.3, 'sawtooth', 0.05);
                } else {
                    state = 'ready';
                    resetBall();
                }
                return;
            }

            // 挡板碰撞
            if (ball.vy > 0 &&
                ball.y + BALL_R >= paddle.y &&
                ball.y - BALL_R <= paddle.y + paddle.h &&
                ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
                ball.y = paddle.y - BALL_R;
                // 根据击中挡板的相对位置改变反弹角度
                let hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
                hit = Math.max(-0.75, Math.min(0.75, hit));
                const sp = Math.hypot(ball.vx, ball.vy);
                ball.vx = hit * sp;
                ball.vy = -Math.sqrt(Math.max(sp * sp - ball.vx * ball.vx, 0));
            }

            // 砖块碰撞（命中一个即跳出，防多次反弹）
            for (const b of bricks) {
                if (hitBrick(b)) {
                    updateHud();
                    break;
                }
            }

            // 过关检测
            if (bricks.every(b => !b.alive)) {
                level++;
                ballSpeed *= 1.08;
                buildBricks();
                resetBall();
                state = 'ready';
                updateHud();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // 砖块
            for (const b of bricks) {
                if (!b.alive) continue;
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.w, b.h);
            }

            // 挡板
            ctx.fillStyle = '#6c8cff';
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

            // 球
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
            ctx.fillStyle = '#e8ecf4';
            ctx.fill();

            // 遮罩
            if (state === 'ready') {
                setOverlay(true, '按 空格 / 点击 发射', '', 'ready', false);
            } else if (state === 'paused') {
                setOverlay(true, '已暂停', '按 P 继续', 'pause', false);
            } else if (state === 'over') {
                setOverlay(true, '游戏结束', '得分 ' + score, 'fail', true);
            } else {
                setOverlay(false);
            }
        }

        // 统一 DOM 遮罩（与其它游戏一致）
        const overlayEl = document.getElementById('overlay');
        const overlayTitleEl = document.getElementById('overlayTitle');
        const overlaySubEl = document.getElementById('overlaySub');
        const overlayBtnEl = document.getElementById('overlayBtn');
        function setOverlay(show, title, sub, titleClass, showBtn) {
            if (!show) { overlayEl.style.display = 'none'; return; }
            overlayEl.style.display = 'flex';
            overlayTitleEl.textContent = title;
            overlayTitleEl.className = 'game-overlay-title ' + titleClass;
            overlaySubEl.textContent = sub;
            overlaySubEl.className = 'game-overlay-sub' + (titleClass === 'pause' || titleClass === 'ready' ? ' muted' : '');
            overlayBtnEl.style.display = showBtn ? '' : 'none';
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }


        // ---- 输入 ----
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) e.preventDefault();
            if (e.key === ' ') {
                if (state === 'ready') launchBall();
                else if (state === 'playing') { /* 游戏进行中空格无效 */ }
            }
            if (e.key === 'p' || e.key === 'P') {
                if (state === 'playing') state = 'paused';
                else if (state === 'paused') state = 'playing';
            }
            if (e.key === 'r' || e.key === 'R') restart();
        });
        document.addEventListener('keyup', (e) => { keys[e.key] = false; });

        // 鼠标移动控制挡板
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (W / rect.width);
            paddle.x = Math.max(0, Math.min(W - paddle.w, mx - paddle.w / 2));
        });
        // 点击发射
        canvas.addEventListener('click', () => {
            if (state === 'ready') launchBall();
        });

        // 触摸控制：拖动挡板 + 点击发射（移动端）
        function touchPaddle(e) {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.touches[0].clientX - rect.left) * (W / rect.width);
            paddle.x = Math.max(0, Math.min(W - paddle.w, mx - paddle.w / 2));
        }
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchPaddle(e);
            if (state === 'ready') launchBall();
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            touchPaddle(e);
        }, { passive: false });

        function restart() { init(); }

        // 启动
        init();
        loop();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
