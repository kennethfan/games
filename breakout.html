<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background: #16213e;
            padding: 22px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .title {
            font-size: 40px;
            font-weight: bold;
            color: #00d4ff;
            letter-spacing: 1px;
        }

        .stats { display: flex; gap: 10px; }

        .stat-box {
            background: #0f3460;
            padding: 8px 16px;
            border-radius: 8px;
            text-align: center;
            min-width: 64px;
        }
        .stat-label { font-size: 12px; color: #9db4d6; }
        .stat-value { font-size: 20px; font-weight: bold; }
        .score-v { color: #ffd93d; }
        .level-v { color: #00d4ff; }
        .lives-v { color: #ff6b6b; letter-spacing: 2px; }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .hint { font-size: 13px; color: #9db4d6; }
        .hint b { color: #00d4ff; }

        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover { background: #ff6b6b; transform: translateY(-2px); }

        canvas {
            display: block;
            background: #0f3460;
            border-radius: 10px;
            cursor: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">打砖块</div>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">得分</div>
                    <div class="stat-value score-v" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">关卡</div>
                    <div class="stat-value level-v" id="level">1</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">生命</div>
                    <div class="stat-value lives-v" id="lives">♥♥♥</div>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <div class="hint"><b>← →</b> / <b>A D</b> / 鼠标移动挡板，<b>空格</b>或点击发射，<b>P</b> 暂停</div>
            <button onclick="restart()">重新开始</button>
        </div>

        <canvas id="game" width="480" height="520"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const livesEl = document.getElementById('lives');

        // 游戏常量
        const W = canvas.width;            // 画布宽
        const H = canvas.height;           // 画布高
        const PADDLE_W = 90;               // 挡板宽
        const PADDLE_H = 12;               // 挡板高
        const PADDLE_SPEED = 7;            // 挡板键盘移动速度
        const BALL_R = 7;                  // 球半径
        const BRICK_ROWS = 5;              // 砖块行数
        const BRICK_COLS = 9;              // 砖块列数
        const BRICK_H = 18;                // 砖块高
        const BRICK_GAP = 4;               // 砖块间距
        const TOP_OFFSET = 45;             // 砖块区距顶部
        const SIDE_MARGIN = 15;            // 砖块区左右边距
        const MAX_LIVES = 3;

        // 每行砖块颜色与分值
        const ROW_COLORS = ['#f65e3b', '#f59563', '#f2b179', '#edcf72', '#9fe1cb'];
        const ROW_POINTS = [50, 40, 30, 20, 10];

        let score, level, lives;
        let state;                         // 'ready' | 'playing' | 'paused' | 'over'
        let paddle;                        // { x, y, w, h }
        let ball;                          // { x, y, vx, vy, stuck }
        let bricks;                        // 砖块数组
        let ballSpeed;                     // 当前球速（每关递增）
        const keys = {};                   // 记录按下的键

        function resetBall() {
            ball = {
                x: paddle.x + paddle.w / 2,
                y: paddle.y - BALL_R - 2,
                vx: 0,
                vy: 0,
                stuck: true
            };
        }

        function launchBall() {
            if (!ball.stuck) return;
            ball.stuck = false;
            // 以略微偏上的角度发射
            ball.vx = ballSpeed * 0.35;
            ball.vy = -ballSpeed * 0.94;
        }

        function buildBricks() {
            bricks = [];
            const totalW = W - SIDE_MARGIN * 2;
            const bw = (totalW - BRICK_GAP * (BRICK_COLS - 1)) / BRICK_COLS;
            for (let r = 0; r < BRICK_ROWS; r++) {
                for (let c = 0; c < BRICK_COLS; c++) {
                    bricks.push({
                        x: SIDE_MARGIN + c * (bw + BRICK_GAP),
                        y: TOP_OFFSET + r * (BRICK_H + BRICK_GAP),
                        w: bw,
                        h: BRICK_H,
                        color: ROW_COLORS[r % ROW_COLORS.length],
                        points: ROW_POINTS[r % ROW_POINTS.length],
                        alive: true
                    });
                }
            }
        }

        function init() {
            score = 0;
            level = 1;
            lives = MAX_LIVES;
            ballSpeed = 4.2;
            state = 'ready';
            paddle = { x: (W - PADDLE_W) / 2, y: H - 32, w: PADDLE_W, h: PADDLE_H };
            buildBricks();
            resetBall();
            updateHud();
        }

        function updateHud() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            livesEl.textContent = '♥'.repeat(Math.max(lives, 0)) || '—';
        }

        // 挡板左右移动（键盘）
        function movePaddle() {
            let dir = 0;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) dir -= 1;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) dir += 1;
            paddle.x += dir * PADDLE_SPEED;
            paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
        }

        // 碰撞处理：球与单个砖块，返回是否命中
        function hitBrick(b) {
            if (!b.alive) return false;
            if (ball.x + BALL_R < b.x || ball.x - BALL_R > b.x + b.w) return false;
            if (ball.y + BALL_R < b.y || ball.y - BALL_R > b.y + b.h) return false;

            // 用上一帧位置判断反弹方向，避免穿透误判
            const prevX = ball.x - ball.vx;
            const prevY = ball.y - ball.vy;
            const fromTop = prevY + BALL_R <= b.y;
            const fromBottom = prevY - BALL_R >= b.y + b.h;
            const fromLeft = prevX + BALL_R <= b.x;
            const fromRight = prevX - BALL_R >= b.x + b.w;

            if (fromTop || fromBottom) ball.vy = -ball.vy;
            else if (fromLeft || fromRight) ball.vx = -ball.vx;
            else { ball.vx = -ball.vx; ball.vy = -ball.vy; }

            b.alive = false;
            score += b.points;
            return true;
        }

        function update() {
            if (state !== 'playing' && state !== 'ready') return;

            movePaddle();

            if (ball.stuck) {
                // 等待发射：球粘在挡板上随其移动
                ball.x = paddle.x + paddle.w / 2;
                ball.y = paddle.y - BALL_R - 2;
                return;
            }

            // 移动球
            ball.x += ball.vx;
            ball.y += ball.vy;

            // 墙壁碰撞
            if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx = -ball.vx; }
            if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx = -ball.vx; }
            if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.vy = -ball.vy; }

            // 掉出底部：扣命
            if (ball.y - BALL_R > H) {
                lives--;
                updateHud();
                if (lives <= 0) {
                    state = 'over';
                } else {
                    state = 'ready';
                    resetBall();
                }
                return;
            }

            // 挡板碰撞
            if (ball.vy > 0 &&
                ball.y + BALL_R >= paddle.y &&
                ball.y - BALL_R <= paddle.y + paddle.h &&
                ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
                ball.y = paddle.y - BALL_R;
                // 根据击中挡板的相对位置改变反弹角度
                let hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
                hit = Math.max(-0.75, Math.min(0.75, hit));
                const sp = Math.hypot(ball.vx, ball.vy);
                ball.vx = hit * sp;
                ball.vy = -Math.sqrt(Math.max(sp * sp - ball.vx * ball.vx, 0));
            }

            // 砖块碰撞（命中一个即跳出，防多次反弹）
            for (const b of bricks) {
                if (hitBrick(b)) {
                    updateHud();
                    break;
                }
            }

            // 过关检测
            if (bricks.every(b => !b.alive)) {
                level++;
                ballSpeed *= 1.08;
                buildBricks();
                resetBall();
                state = 'ready';
                updateHud();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // 砖块
            for (const b of bricks) {
                if (!b.alive) continue;
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.w, b.h);
            }

            // 挡板
            ctx.fillStyle = '#00d4ff';
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

            // 球
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();

            // 遮罩文字
            if (state === 'ready') {
                overlayText('按 空格 / 点击 发射', '');
            } else if (state === 'paused') {
                overlayText('已暂停', '按 P 继续');
            } else if (state === 'over') {
                overlayText('游戏结束', '得分 ' + score + ' · 按 R 重开');
            }
        }

        function overlayText(title, sub) {
            ctx.fillStyle = 'rgba(15, 52, 96, 0.7)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ffd93d';
            ctx.font = 'bold 30px Microsoft YaHei, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(title, W / 2, H / 2 - 10);
            if (sub) {
                ctx.fillStyle = '#eee';
                ctx.font = '16px Microsoft YaHei, sans-serif';
                ctx.fillText(sub, W / 2, H / 2 + 24);
            }
            ctx.textAlign = 'left';
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // ---- 输入 ----
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) e.preventDefault();
            if (e.key === ' ') {
                if (state === 'ready') launchBall();
                else if (state === 'playing') { /* 游戏进行中空格无效 */ }
            }
            if (e.key === 'p' || e.key === 'P') {
                if (state === 'playing') state = 'paused';
                else if (state === 'paused') state = 'playing';
            }
            if (e.key === 'r' || e.key === 'R') restart();
        });
        document.addEventListener('keyup', (e) => { keys[e.key] = false; });

        // 鼠标移动控制挡板
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (W / rect.width);
            paddle.x = Math.max(0, Math.min(W - paddle.w, mx - paddle.w / 2));
        });
        // 点击发射
        canvas.addEventListener('click', () => {
            if (state === 'ready') launchBall();
        });

        function restart() { init(); }

        // 启动
        init();
        loop();
    </script>
</body>
</html>
